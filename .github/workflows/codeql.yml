name: CodeQL

on:
  push:
    branches:
      - main
      - master
    paths:
      - '**/*.rs'
      - 'Cargo.toml'
      - '**/Cargo.toml'

  pull_request:
    branches:
      - main
      - master
    paths:
      - '**/*.rs'
      - 'Cargo.toml'
      - '**/Cargo.toml'

  schedule:
    - cron: '0 3 * * 0'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze Rust
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: rust

      - name: Build
        run: cargo build --release

      - name: Analyze
        uses: github/codeql-action/analyze@v3